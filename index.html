<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Finn</title>
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #mic-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: none;
            background: #0f3460;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        #mic-btn:disabled {
            background: #333;
            opacity: 0.5;
            cursor: not-allowed;
        }

        #mic-btn.listening {
            animation: pulse 1s infinite;
            background: #c0392b;
        }

        #mic-btn.success {
            background: #27ae60;
        }

        #mic-btn.error {
            background: #e67e22;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        #mic-btn svg {
            width: 60px;
            height: 60px;
            fill: #ffffff;
        }
    </style>
</head>
<body>
    <button id="mic-btn" aria-label="Tap to speak">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </button>
    <script>
    const btn = document.getElementById('mic-btn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        btn.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        let listening = false;

        btn.addEventListener('click', () => {
            if (listening) return;
            listening = true;
            btn.classList.add('listening');
            recognition.start();
        });

        recognition.addEventListener('result', (event) => {
            const transcript = event.results[0][0].transcript;
            listening = false;
            btn.classList.remove('listening');
            translateAndSpeak(transcript);
        });

        recognition.addEventListener('error', () => {
            listening = false;
            btn.classList.remove('listening');
            btn.classList.add('error');
            setTimeout(() => btn.classList.remove('error'), 600);
        });

        recognition.addEventListener('end', () => {
            if (listening) {
                listening = false;
                btn.classList.remove('listening');
            }
        });
    }

    async function translateAndSpeak(text) {
        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|fi`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('API error');
            const data = await response.json();
            const translated = data.responseData.translatedText;
            speak(translated);
        } catch (e) {
            btn.classList.add('error');
            setTimeout(() => btn.classList.remove('error'), 600);
        }
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => {};
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fi-FI';

        const setVoice = () => {
            const voices = speechSynthesis.getVoices();
            const finnishVoice = voices.find(v => v.lang.startsWith('fi'));
            if (finnishVoice) {
                utterance.voice = finnishVoice;
            }
        };

        setVoice();
        if (speechSynthesis.getVoices().length === 0) {
            speechSynthesis.addEventListener('voiceschanged', setVoice, { once: true });
        }

        btn.classList.add('success');
        utterance.addEventListener('end', () => {
            btn.classList.remove('success');
        });
        utterance.addEventListener('error', () => {
            btn.classList.remove('success');
        });

        speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
