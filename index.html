<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Finn</title>
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            background: #1a1a2e;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .btn:disabled {
            background: #333;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn svg {
            width: 50px;
            height: 50px;
            fill: #ffffff;
        }

        #rec-btn {
            background: #0f3460;
        }

        #rec-btn.listening {
            animation: pulse 1s infinite;
            background: #c0392b;
        }

        #rec-btn.success {
            background: #27ae60;
        }

        #rec-btn.error {
            background: #e67e22;
        }

        #play-btn {
            background: #0f3460;
        }

        #play-btn.playing {
            background: #27ae60;
        }

        #play-btn:disabled {
            background: #333;
            opacity: 0.3;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <button id="rec-btn" class="btn" aria-label="Tap to record, tap again to stop">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </button>
    <button id="play-btn" class="btn" disabled aria-label="Play Finnish translation">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5v14l11-7z"/>
        </svg>
    </button>
    <script>
    const recBtn = document.getElementById('rec-btn');
    const playBtn = document.getElementById('play-btn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    let lastTranslation = '';

    if (!SpeechRecognition) {
        recBtn.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.continuous = true;

        let listening = false;

        recBtn.addEventListener('click', () => {
            if (listening) {
                listening = false;
                recBtn.classList.remove('listening');
                recognition.stop();
            } else {
                listening = true;
                recBtn.classList.add('listening');
                recognition.start();
            }
        });

        recognition.addEventListener('result', (event) => {
            let transcript = '';
            for (let i = 0; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            translateAndSpeak(transcript);
        });

        recognition.addEventListener('error', () => {
            listening = false;
            recBtn.classList.remove('listening');
            recBtn.classList.add('error');
            setTimeout(() => recBtn.classList.remove('error'), 600);
        });

        recognition.addEventListener('end', () => {
            if (listening) {
                recBtn.classList.remove('listening');
                listening = false;
            }
        });
    }

    async function translateAndSpeak(text) {
        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|fi`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('API error');
            const data = await response.json();
            const translated = data.responseData.translatedText;
            lastTranslation = translated;
            playBtn.disabled = false;
            speak(translated);
        } catch (e) {
            recBtn.classList.add('error');
            setTimeout(() => recBtn.classList.remove('error'), 600);
        }
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => {};
    }

    playBtn.addEventListener('click', () => {
        if (lastTranslation) {
            speak(lastTranslation);
        }
    });

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fi-FI';

        const voices = speechSynthesis.getVoices();
        const finnishVoice = voices.find(v => v.lang.startsWith('fi'));
        if (finnishVoice) {
            utterance.voice = finnishVoice;
        }

        recBtn.classList.add('success');
        playBtn.classList.add('playing');
        utterance.addEventListener('end', () => {
            recBtn.classList.remove('success');
            playBtn.classList.remove('playing');
        });
        utterance.addEventListener('error', () => {
            recBtn.classList.remove('success');
            playBtn.classList.remove('playing');
        });

        speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
